AWSTemplateFormatVersion: '2010-09-09'
Description: Secrets Manager Stack - Create application secrets

Parameters:
  Environment:
    Type: String

Resources:
  FuntionManagerAppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${Environment}/function-manager
      Description: !Sub Application secrets for function-manager in ${Environment}
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: AppName
          Value: function-manager

  AcquiflowAppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${Environment}/acquiflow
      Description: !Sub Application secrets for acquiflow in ${Environment}
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: AppName
          Value: acquiflow

# ── SSM Parameter Store ────────────────────────────────────────────────────
  FunctionManagerSSMSecretArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /cfn/${Environment}/secrets/function-manager/SecretArn
      Type: String
      Value: !Ref FuntionManagerAppSecret
      Description: !Sub "[${Environment}] Secrets Manager Secret ARN for function-manager"
      Tags:
        Environment: !Ref Environment
        AppName: function-manager
      
  AcquiflowSSMSecretArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /cfn/${Environment}/secrets/acquiflow/SecretArn
      Type: String
      Value: !Ref AcquiflowAppSecret
      Description: !Sub "[${Environment}] Secrets Manager Secret ARN for acquiflow"
      Tags:
        Environment: !Ref Environment
        AppName: acquiflow

Outputs:
  FunctionManagerSecretArn:
    Description: Function Manager Secret ARN
    Value: !Ref FuntionManagerAppSecret
    Export:
      Name: !Sub ${AWS::StackName}-FunctionManagerSecretArn

  AcquiflowSecretArn:
    Description: Acquiflow Secret ARN
    Value: !Ref AcquiflowAppSecret
    Export:
      Name: !Sub ${AWS::StackName}-AcquiflowSecretArn
      