AWSTemplateFormatVersion: '2010-09-09'
Description: Secrets Manager Stack - Generic app secret (one per service)

Parameters:
  Environment:
    Type: String
  AppName:
    Type: String
    Description: Service name (e.g. function-manager, acquiflow)

Resources:
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${Environment}/${AppName}
      Description: !Sub "Application secrets for ${AppName} in ${Environment}"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: AppName
          Value: !Ref AppName
        - Key: ManagedBy
          Value: CloudFormation

  SSMSecretArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /cfn/${Environment}/secrets/${AppName}/SecretArn
      Type: String
      Value: !Ref AppSecret
      Description: !Sub "[${Environment}] Secrets Manager ARN for ${AppName}"
      Tags:
        Environment: !Ref Environment
        AppName: !Ref AppName
        ManagedBy: CloudFormation

Outputs:
  SecretArn:
    Description: Secret ARN
    Value: !Ref AppSecret
    Export:
      Name: !Sub ${AWS::StackName}-SecretArn

  SecretName:
    Description: Secret Name
    Value: !Sub ${Environment}/${AppName}
    Export:
      Name: !Sub ${AWS::StackName}-SecretName
