AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Service Stack - Target Group, Listener Rule, ECS Service, and Auto Scaling

Parameters:
  Environment:
    Type: String
  AppName:
    Type: String
  ECSClusterName:
    Type: String
  TaskDefinitionArn:
    Type: String
  ContainerName:
    Type: String
    Description: Container name to register with the target group (nginx or rails)
  ContainerPort:
    Type: Number
    Default: 80
  VpcId:
    Type: String
  VpcSubnetIds:
    Type: CommaDelimitedList
  SecurityGroupIds:
    Type: CommaDelimitedList

  # ── Target Group + Listener Rule ──────────────────────────────────────────
  ALBHTTPListenerArn:
    Type: String
    Description: ARN of the ALB HTTP Listener
  AppHostHeader:
    Type: String
    Description: Host header for listener rule (e.g. functionmanager.example.com)
  TargetPort:
    Type: Number
    Default: 80
    Description: Port the target group forwards traffic to
  ListenerRulePriority:
    Type: Number
    Description: Unique priority for the ALB listener rule (e.g. 100, 101)

  # ── Scaling ───────────────────────────────────────────────────────────────
  DesiredCount:
    Type: Number
    Default: 1
  ScalingMinCapacity:
    Type: Number
    Default: 1
  ScalingMaxCapacity:
    Type: Number
    Default: 4
  CPUScaleOutThreshold:
    Type: Number
    Default: 70
  CPUScaleInThreshold:
    Type: Number
    Default: 30
  MemoryScaleOutThreshold:
    Type: Number
    Default: 75
  MemoryScaleInThreshold:
    Type: Number
    Default: 40

Resources:

  # ── Target Group ──────────────────────────────────────────────────────────
  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${Environment}-${AppName}-tg
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref TargetPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-${AppName}-tg
        - Key: Environment
          Value: !Ref Environment
        - Key: AppName
          Value: !Ref AppName
        - Key: ManagedBy
          Value: CloudFormation

  # ── Listener Rule ─────────────────────────────────────────────────────────
  AppListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBHTTPListenerArn
      Priority: !Ref ListenerRulePriority
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Ref AppHostHeader
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  # ── ECS Service ────────────────────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: AppListenerRule        # ← must exist before service registers
    Properties:
      ServiceName: !Sub ${Environment}-${AppName}-service
      Cluster: !Ref ECSClusterName
      TaskDefinition: !Ref TaskDefinitionArn
      LaunchType: EC2
      DesiredCount: !Ref DesiredCount
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Ref VpcSubnetIds
          SecurityGroups: !Ref SecurityGroupIds
      LoadBalancers:
        - ContainerName: !Ref ContainerName
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref AppTargetGroup   # ← references TG created above
      HealthCheckGracePeriodSeconds: 60
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-${AppName}-service
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ── Auto Scaling IAM Role ──────────────────────────────────────────────────
  ServiceAutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Environment}-${AppName}-autoscaling-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceAutoscaleRole

  # ── Scalable Target ────────────────────────────────────────────────────────
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: ECSService
    Properties:
      MaxCapacity: !Ref ScalingMaxCapacity
      MinCapacity: !Ref ScalingMinCapacity
      ResourceId: !Sub service/${ECSClusterName}/${Environment}-${AppName}-service
      RoleARN: !GetAtt ServiceAutoScalingRole.Arn
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  # ── CPU Scale Out ──────────────────────────────────────────────────────────
  CPUScaleOutPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${Environment}-${AppName}-cpu-scale-out
      PolicyType: StepScaling
      ScalingTargetId: !Ref ScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: 120
        MetricAggregationType: Average
        StepAdjustments:
          - MetricIntervalLowerBound: 0
            MetricIntervalUpperBound: 20
            ScalingAdjustment: 1
          - MetricIntervalLowerBound: 20
            ScalingAdjustment: 2

  CPUScaleOutAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${Environment}-${AppName}-cpu-high
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Sub ${Environment}-${AppName}-service
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: !Ref CPUScaleOutThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref CPUScaleOutPolicy

  # ── CPU Scale In ───────────────────────────────────────────────────────────
  CPUScaleInPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${Environment}-${AppName}-cpu-scale-in
      PolicyType: StepScaling
      ScalingTargetId: !Ref ScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: 300
        MetricAggregationType: Average
        StepAdjustments:
          - MetricIntervalUpperBound: 0
            ScalingAdjustment: -1

  CPUScaleInAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${Environment}-${AppName}-cpu-low
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Sub ${Environment}-${AppName}-service
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: !Ref CPUScaleInThreshold
      ComparisonOperator: LessThanOrEqualToThreshold
      AlarmActions:
        - !Ref CPUScaleInPolicy

  # ── Memory Scale Out ───────────────────────────────────────────────────────
  MemoryScaleOutPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${Environment}-${AppName}-memory-scale-out
      PolicyType: StepScaling
      ScalingTargetId: !Ref ScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: 120
        MetricAggregationType: Average
        StepAdjustments:
          - MetricIntervalLowerBound: 0
            ScalingAdjustment: 1

  MemoryScaleOutAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${Environment}-${AppName}-memory-high
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Sub ${Environment}-${AppName}-service
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: !Ref MemoryScaleOutThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref MemoryScaleOutPolicy

  # ── Memory Scale In ────────────────────────────────────────────────────────
  MemoryScaleInPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${Environment}-${AppName}-memory-scale-in
      PolicyType: StepScaling
      ScalingTargetId: !Ref ScalableTarget
      StepScalingPolicyConfiguration:
        AdjustmentType: ChangeInCapacity
        Cooldown: 300
        MetricAggregationType: Average
        StepAdjustments:
          - MetricIntervalUpperBound: 0
            ScalingAdjustment: -1

  MemoryScaleInAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${Environment}-${AppName}-memory-low
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Ref ECSClusterName
        - Name: ServiceName
          Value: !Sub ${Environment}-${AppName}-service
      Statistic: Average
      Period: 60
      EvaluationPeriods: 5
      Threshold: !Ref MemoryScaleInThreshold
      ComparisonOperator: LessThanOrEqualToThreshold
      AlarmActions:
        - !Ref MemoryScaleInPolicy

  # ── SSM Parameters ─────────────────────────────────────────────────────────
  SSMTargetGroupArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /cfn/${Environment}/${AppName}/elb/TargetGroupArn
      Type: String
      Value: !Ref AppTargetGroup
      Tags:
        Environment: !Ref Environment
        AppName: !Ref AppName
        ManagedBy: CloudFormation

  SSMEcsServiceName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /cfn/${Environment}/ecs/${AppName}/ServiceName
      Type: String
      Value: !GetAtt ECSService.Name
      Tags:
        Environment: !Ref Environment
        AppName: !Ref AppName
        ManagedBy: CloudFormation

Outputs:
  ECSServiceName:
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub ${AWS::StackName}-ECSServiceName

  TargetGroupArn:
    Value: !Ref AppTargetGroup
    Export:
      Name: !Sub ${AWS::StackName}-TargetGroupArn
