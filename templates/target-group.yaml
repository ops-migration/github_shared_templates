AWSTemplateFormatVersion: '2010-09-09'
Description: Target Group Stack - Multiple Target Groups with Host-Header Listener Rules

Parameters:
  Environment:
    Type: String
  VpcId:
    Type: String
  ALBListenerArn:
    Type: String
    Default: '{{resolve:ssm:/cfn/alb/HTTPListenerArn}}'

  # ── FunctionManager ───────────────────────────────────────────────────────────────────
  FunctionManagerName:
    Type: String
    Default: FunctionManager
  FunctionManagerHostHeader:
    Type: String
    Default: functionmanager.example.com
  FunctionManagerTargetPort:
    Type: Number
    Default: 80
  FunctionManagerRulePriority:
    Type: Number
    Default: 100

  # ── Acquiflow ───────────────────────────────────────────────────────────────────
  AcquiflowName:
    Type: String
    Default: Acquiflow
  AcquiflowHostHeader:
    Type: String
    Default: Acquiflow.example.com
  AcquiflowTargetPort:
    Type: Number
    Default: 3000
  AcquiflowRulePriority:
    Type: Number
    Default: 101


Resources:
  # ════════════════════════════════════════════════════════════════════════════
  # FunctionManager
  # ════════════════════════════════════════════════════════════════════════════
  FunctionManagerTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${Environment}-FunctionManager-tg
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref FunctionManagerTargetPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-FunctionManager-tg
        - Key: Environment
          Value: !Ref Environment
        - Key: App
          Value: !Ref FunctionManagerName

  FunctionManagerListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerArn
      Priority: !Ref FunctionManagerRulePriority
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Ref FunctionManagerHostHeader
      Actions:
        - Type: forward
          TargetGroupArn: !Ref FunctionManagerTargetGroup

  # ════════════════════════════════════════════════════════════════════════════
  # Acquiflow
  # ════════════════════════════════════════════════════════════════════════════
  AcquiflowTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${Environment}-Acquiflow-tg
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref AcquiflowTargetPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      Tags:
        - Key: Name
          Value: !Sub ${Environment}-Acquiflow-tg
        - Key: Environment
          Value: !Ref Environment
        - Key: App
          Value: !Ref AcquiflowName

  AcquiflowListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListenerArn
      Priority: !Ref AcquiflowRulePriority
      Conditions:
        - Field: host-header
          HostHeaderConfig:
            Values:
              - !Ref AcquiflowHostHeader
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AcquiflowTargetGroup

  # ════════════════════════════════════════════════════════════════════════════
  # SSM Parameters for Target Groups
  # ════════════════════════════════════════════════════════════════════════════
  FunctionManagerSSMTargetGroupArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /cfn/${Environment}/FunctionManager/elb/TargetGroupArn
      Type: String
      Value: !Ref FunctionManagerTargetGroup
      Tags:
        Environment: !Ref Environment
        ManagedBy: CloudFormation
        AppName: !Ref FunctionManagerName

  AcquiflowSSMTargetGroupArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /cfn/${Environment}/Acquiflow/elb/TargetGroupArn
      Type: String
      Value: !Ref AcquiflowTargetGroup
      Tags:
        Environment: !Ref Environment
        ManagedBy: CloudFormation
        AppName: !Ref AcquiflowName

Outputs:
  FunctionManagerTargetGroupArn:
    Value: !Ref FunctionManagerTargetGroup
    Export:
      Name: !Sub ${AWS::StackName}-FunctionManager-TargetGroupArn

  AcquiflowTargetGroupArn:
    Value: !Ref AcquiflowTargetGroup
    Export:
      Name: !Sub ${AWS::StackName}-Acquiflow-TargetGroupArn