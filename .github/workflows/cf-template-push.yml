name: Deploy CloudFormation Templates

on:
  push:
    branches:
      - main

jobs:
  cf-push-templates-to-s3:
    runs-on:
      - codebuild-ecs-workflow-${{ github.run_id }}-${{ github.run_attempt }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Copy templates to S3
        run: |
          aws s3 cp templates/ s3://ecs-migration-cloud-formation-templates/templates/ --recursive 