name: Reusable CD - Deploy to Amazon ECS

on:
  workflow_call:
    inputs:       
      cf-stack-name:
        description: 'CloudFormation Stack name'
        required: true
        type: string
      runner-label:
        description: 'Custom runner label pattern'
        required: false
        type: string
        default: 'codebuild-shared-workflow'

jobs:
  deploy:
    name: Deploying Templates
    runs-on:
      - ${{ inputs.runner-label }}-${{ github.run_id }}-${{ github.run_attempt }}
    
    permissions:
      contents: read
      id-token: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Update CloudFormation Stack
        id: update-stack
        run: |
          
          aws cloudformation deploy \
            --template-file iac/aws/us-east-1/stack.yaml \
            --stack-name "${{ inputs.cf-stack-name }}" \
            --region "us-east-1" \
            --capabilities CAPABILITY_NAMED_IAM

        
          echo "✅ CloudFormation stack updated successfully" 
