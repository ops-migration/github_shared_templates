name: Reusable CD - Deploy CloudFormation Stacks

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (dev, qa, prod)'
        required: true
        type: string
      stacks-path:
        description: 'Path to the folder containing stack YAML files'
        required: false
        type: string
        default: 'iac/aws/us-east-1'

jobs:
  deploy:
    name: Deploying CloudFormation Stacks
    runs-on:
      - codebuild-ecs-workflow-${{ github.run_id }}-${{ github.run_attempt }}

    permissions:
      contents: read
      id-token: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                  # full history — required for HEAD~1

      - name: Get changed stack files
        id: changes
        run: |
          # Check if this is the very first commit on the branch
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "Comparing HEAD~1 → HEAD"
            CHANGED=$(git diff --name-only HEAD~1 HEAD \
              | grep "^${{ inputs.stacks-path }}/.*\.yaml$" \
              | tr '\n' ' ' \
              || true)
          else
            echo "First commit on branch — deploying all stack files"
            CHANGED=$(find "${{ inputs.stacks-path }}" -name "*.yaml" \
              | tr '\n' ' ')
          fi

          echo "Changed files: $CHANGED"

          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED"     >> $GITHUB_OUTPUT
          echo "EOF"          >> $GITHUB_OUTPUT

      - name: Deploy changed stacks
        if: steps.changes.outputs.changed != ''
        run: |
          for f in ${{ steps.changes.outputs.changed }}; do
            filename=$(basename "$f" .yaml)
            stack_name="${{ inputs.environment }}-${filename}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Deploying: $f  →  Stack: $stack_name"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            aws cloudformation deploy \
              --template-file "$f" \
              --stack-name "$stack_name" \
              --region "us-east-1" \
              --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
              --no-fail-on-empty-changeset

            echo "✅ $stack_name deployed successfully"
          done

      - name: No changes detected
        if: steps.changes.outputs.changed == ''
        run: echo "ℹ️ No stack files changed — nothing to deploy"