name: Reusable CD - Deploy CloudFormation Stacks

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      stacks-path:
        required: false
        type: string
        default: 'iac/aws/us-east-1'
    secrets:
      github-token:
        required: true

jobs:
  deploy:
    name: Deploying CloudFormation Stacks
    runs-on:
      - codebuild-ecs-workflow-${{ github.run_id }}-${{ github.run_attempt }}

    permissions:
      contents: read
      id-token: none

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          token: ${{ secrets.github-token }}
          fetch-depth: 1

      - name: Detect and deploy changed stacks
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          STACKS_PATH="${{ inputs.stacks-path }}"

          echo "Fetching changed files for commit: $SHA"

          # ✅ Use GitHub API — always returns the full file list regardless of commit size
          CHANGED=$(gh api repos/$REPO/commits/$SHA \
            --jq '.files[] | select(.status != "removed") | .filename' \
            | grep "^${STACKS_PATH}/.*\.yaml$" \
            | tr '\n' ' ' \
            || true)

          echo "Changed files: $CHANGED"

          if [ -z "$CHANGED" ]; then
            echo "ℹ️ No stack files changed — nothing to deploy"
            exit 0
          fi

          for f in $CHANGED; do
            if [ ! -f "$f" ]; then
              echo "⚠️  Skipping $f — file not found"
              continue
            fi

            filename=$(basename "$f" .yaml)
            stack_name="${{ inputs.environment }}-${filename}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Deploying: $f  →  Stack: $stack_name"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            aws cloudformation deploy \
              --template-file "$f" \
              --stack-name "$stack_name" \
              --region "us-east-1" \
              --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
              --no-fail-on-empty-changeset

            echo "✅ $stack_name deployed successfully"
          done
